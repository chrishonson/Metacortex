<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="920" viewBox="0 0 1600 920" role="img" aria-labelledby="title desc">
  <title id="title">Scoped MCP client endpoints</title>
  <desc id="desc">Diagram showing a protected admin endpoint and safer scoped browser endpoints with limited allowed tools.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#07111f"/>
      <stop offset="100%" stop-color="#101d34"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#020813" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1600" height="920" fill="url(#bg)"/>
  <text x="84" y="106" fill="#f8fbff" font-size="50" font-family="Inter, Arial, sans-serif" font-weight="700">Scoped browser endpoints vs admin endpoint</text>
  <text x="84" y="152" fill="#9dc2e6" font-size="24" font-family="Inter, Arial, sans-serif">MetaCortex exposes one admin surface and separate client profiles so ChatGPT and Claude never see maintenance tools.</text>

  <rect x="78" y="220" width="440" height="582" rx="34" fill="#1d1320" stroke="#ff9a72" stroke-width="3.5" filter="url(#shadow)"/>
  <text x="118" y="286" fill="#fff5ee" font-size="38" font-family="Inter, Arial, sans-serif" font-weight="700">Admin endpoint</text>
  <text x="118" y="332" fill="#ffd7c3" font-size="26" font-family="Menlo, Monaco, Consolas, monospace">/mcp</text>
  <text x="118" y="374" fill="#ffd7c3" font-size="22" font-family="Inter, Arial, sans-serif">Bearer: MCP_ADMIN_TOKEN</text>

  <rect x="118" y="420" width="360" height="70" rx="18" fill="#2b1e2e"/>
  <text x="146" y="465" fill="#fff5ee" font-size="28" font-family="Inter, Arial, sans-serif">remember_context</text>
  <rect x="118" y="506" width="360" height="70" rx="18" fill="#2b1e2e"/>
  <text x="146" y="551" fill="#fff5ee" font-size="28" font-family="Inter, Arial, sans-serif">search_context</text>
  <rect x="118" y="592" width="360" height="70" rx="18" fill="#2b1e2e"/>
  <text x="146" y="637" fill="#fff5ee" font-size="28" font-family="Inter, Arial, sans-serif">fetch_context</text>
  <rect x="118" y="678" width="360" height="70" rx="18" fill="#46212f" stroke="#ff8d74" stroke-width="2.5"/>
  <text x="146" y="723" fill="#ffe6df" font-size="28" font-family="Inter, Arial, sans-serif">deprecate_context</text>

  <rect x="578" y="220" width="430" height="582" rx="34" fill="#12263e" stroke="#41cbff" stroke-width="3.5" filter="url(#shadow)"/>
  <text x="618" y="286" fill="#f6fbff" font-size="38" font-family="Inter, Arial, sans-serif" font-weight="700">ChatGPT profile</text>
  <text x="618" y="332" fill="#bfe8ff" font-size="26" font-family="Menlo, Monaco, Consolas, monospace">/clients/chatgpt-web/mcp</text>
  <text x="618" y="374" fill="#bfe8ff" font-size="22" font-family="Inter, Arial, sans-serif">auth_token in URL + allowedOrigins</text>

  <rect x="618" y="420" width="350" height="70" rx="18" fill="#173150"/>
  <text x="646" y="465" fill="#f6fbff" font-size="28" font-family="Inter, Arial, sans-serif">remember_context</text>
  <rect x="618" y="506" width="350" height="70" rx="18" fill="#173150"/>
  <text x="646" y="551" fill="#f6fbff" font-size="28" font-family="Inter, Arial, sans-serif">search_context</text>
  <rect x="618" y="592" width="350" height="70" rx="18" fill="#173150"/>
  <text x="646" y="637" fill="#f6fbff" font-size="28" font-family="Inter, Arial, sans-serif">fetch_context</text>
  <rect x="618" y="678" width="350" height="70" rx="18" fill="#0d1d31" stroke="#ff6a6a" stroke-width="2.5"/>
  <text x="646" y="723" fill="#ffb2b2" font-size="28" font-family="Inter, Arial, sans-serif">deprecate_context blocked</text>

  <rect x="1068" y="220" width="454" height="582" rx="34" fill="#17203f" stroke="#99a8ff" stroke-width="3.5" filter="url(#shadow)"/>
  <text x="1108" y="286" fill="#f6f7ff" font-size="38" font-family="Inter, Arial, sans-serif" font-weight="700">Claude profile</text>
  <text x="1108" y="332" fill="#d3d8ff" font-size="26" font-family="Menlo, Monaco, Consolas, monospace">/clients/claude-web/mcp</text>
  <text x="1108" y="374" fill="#d3d8ff" font-size="22" font-family="Inter, Arial, sans-serif">Bearer token or tokenized URL</text>

  <rect x="1108" y="420" width="374" height="70" rx="18" fill="#212a55"/>
  <text x="1136" y="465" fill="#f6f7ff" font-size="28" font-family="Inter, Arial, sans-serif">remember_context</text>
  <rect x="1108" y="506" width="374" height="70" rx="18" fill="#212a55"/>
  <text x="1136" y="551" fill="#f6f7ff" font-size="28" font-family="Inter, Arial, sans-serif">search_context</text>
  <rect x="1108" y="592" width="374" height="70" rx="18" fill="#212a55"/>
  <text x="1136" y="637" fill="#f6f7ff" font-size="28" font-family="Inter, Arial, sans-serif">fetch_context</text>
  <rect x="1108" y="678" width="374" height="70" rx="18" fill="#151b37" stroke="#ff6a6a" stroke-width="2.5"/>
  <text x="1136" y="723" fill="#ffb2b2" font-size="28" font-family="Inter, Arial, sans-serif">admin-only tools hidden</text>

  <text x="84" y="868" fill="#98bde1" font-size="24" font-family="Inter, Arial, sans-serif">The same Cloud Function serves every client, but each browser connection gets its own token, origin allowlist, and tool allowlist.</text>
</svg>
